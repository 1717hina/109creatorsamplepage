<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Artist Portfolio HUD</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Sans+JP:wght@300;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-dark: #03050d;
      --accent-gold: #f3e5ab;
      --accent-purple: #8a2be2;
      --glass-border: rgba(243, 229, 171, 0.2);
      --safe-area-bottom: env(safe-area-inset-bottom);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: var(--bg-dark);
      color: #fff;
      font-family: 'Noto Sans JP', sans-serif;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      justify-content: center;
    }

    .bg-layer {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 50% 30%, #120e2e 0%, #03050d 100%);
      z-index: -2;
    }

    .screen-container {
      width: 100%;
      max-width: 430px;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 0 15px calc(10px + var(--safe-area-bottom));
      position: relative;
    }

    .hud-clock-section {
      position: relative;
      width: calc(100% + 30px);
      margin-left: -15px;
      height: 220px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      transition: background 2s ease;
    }

    .hud-clock-section.morning { background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%); }
    .hud-clock-section.day { background: radial-gradient(circle at center, #1e90ff 0%, #120e2e 100%); }
    .hud-clock-section.evening { background: linear-gradient(to bottom, #ff8c00 0%, #4b0082 100%); }
    .hud-clock-section.night { background: radial-gradient(circle at center, #1a143d 0%, #03050d 100%); }
    .hud-clock-section.midnight { background: linear-gradient(to bottom, #020111 0%, #191970 100%); }

    #weather-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .hud-circle {
      position: absolute;
      width: 320px;
      height: 320px;
      border: 1px solid rgba(243, 229, 171, 0.15);
      border-radius: 50%;
      mask: radial-gradient(transparent 55%, black 56%);
      background: repeating-conic-gradient(from 0deg, var(--accent-gold) 0deg 1deg, transparent 1deg 10deg);
      opacity: 0.2;
      animation: rotateHUD 60s linear infinite;
      z-index: 2;
    }

    @keyframes rotateHUD {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .clock-content { z-index: 5; text-align: center; margin-top: 10px; }
    .clock-label { font-family: 'Cinzel', serif; font-size: 10px; color: var(--accent-gold); letter-spacing: 2px; }
    #clock { font-family: 'Cinzel', serif; font-size: 78px; font-weight: 400; line-height: 1; }
    #date { font-family: 'Cinzel', serif; font-size: 14px; color: var(--accent-gold); letter-spacing: 3px; }

    .side-info {
      position: absolute;
      bottom: 30px;
      width: 80px;
      font-size: 10px;
      z-index: 5;
    }

    .info-left { left: 20px; text-align: left; }
    .info-right { right: 20px; text-align: right; }
    .info-title { color: var(--accent-gold); border-bottom: 1px solid var(--accent-gold); margin-bottom: 5px; font-weight: bold; }
    .info-val { font-size: 22px; font-family: 'Cinzel', serif; }

    .banner-area {
      width: 100%;
      position: relative;
      margin-top: -10px;
      z-index: 10;
    }

    .banner-container {
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      overflow-x: auto;
      display: flex;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      touch-action: pan-x;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    .banner-container::-webkit-scrollbar { display: none; }

    .slide {
      min-width: 100%;
      height: 100%;
      scroll-snap-align: start;
      position: relative;
    }

    .slide a,
    .slide-link {
      display: block;
      width: 100%;
      height: 100%;
      position: relative;
      color: inherit;
      text-decoration: none;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    .banner-footer {
      position: absolute;
      left: 0;
      bottom: 0;
      z-index: 10;
      width: 100%;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      padding: 28px 14px 12px;
      font-size: 11px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      color: #fff;
      pointer-events: none;
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin: 8px 0;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      transition: 0.25s;
    }

    .dot.active {
      background: var(--accent-gold);
      width: 15px;
      border-radius: 3px;
    }

    .app-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px 10px;
      margin-top: 5px;
      flex-grow: 1;
    }

    .app-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: inherit;
      text-decoration: none;
    }

    .icon-box {
      width: 65px;
      height: 65px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .icon-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .icon-box::before {
      content: '';
      position: absolute;
      bottom: -5px;
      right: -5px;
      width: 15px;
      height: 15px;
      background: var(--accent-purple);
      filter: blur(8px);
      opacity: 0.6;
      pointer-events: none;
    }

    .app-label {
      font-size: 10px;
      opacity: 0.8;
      margin-top: 5px;
      color: #fff;
      text-decoration: none;
    }

    .bottom-nav {
      margin-top: 10px;
      height: 80px;
      display: flex;
      gap: 5px;
      align-items: flex-end;
    }

    .nav-item {
      flex: 1;
      height: 65px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      clip-path: polygon(10% 0, 90% 0, 100% 20%, 100% 100%, 0 100%, 0 20%);
    }

    .nav-item.center {
      height: 80px;
      background: rgba(243, 229, 171, 0.1);
      clip-path: polygon(15% 0, 85% 0, 100% 15%, 100% 100%, 0 100%, 0 15%);
    }

    .nav-icon { font-size: 22px; margin-bottom: 2px; }
    .nav-text { font-size: 10px; color: var(--accent-gold); font-weight: bold; }
    .badge {
      position: absolute;
      top: 15px;
      right: 25%;
      background: var(--accent-purple);
      color: white;
      font-size: 9px;
      padding: 1px 6px;
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <div class="bg-layer"></div>

  <div class="screen-container">

    <section class="hud-clock-section" id="clock-section">
      <canvas id="weather-canvas"></canvas>
      <div class="hud-circle"></div>

      <div class="side-info info-left">
        <div class="info-title">NEXT EVENT</div>
        <div style="font-size:8px;">夏コミまで</div>
        <div class="info-val">58</div>
        <div style="font-size:8px;">DAYS</div>
      </div>

      <div class="clock-content">
        <div class="clock-label">CURRENT TIME</div>
        <div id="clock">00:00</div>
        <div id="date">2026.06.16 TUE</div>
      </div>

      <div class="side-info info-right">
        <div class="info-title">STATUS</div>
        <div style="font-size:8px;">原稿進捗</div>
        <div class="info-val">65<span style="font-size:12px;">%</span></div>
      </div>
    </section>

    <section class="banner-area">
      <div class="banner-container" id="slider">

        <div class="slide">
          <a class="slide-link" href="comike/index.html">
            <img src="banner1.png" alt="banner">
            <div class="banner-footer">
              <span>予告番組：穏やかな夜をよしとせず</span>
              <span>VIEW MORE →</span>
            </div>
          </a>
        </div>

        <div class="slide">
          <a class="slide-link" href="#">
            <img src="banner2.png" onerror="this.src='https://via.placeholder.com/800x450/1a1a1a/f3e5ab?text=BANNER+2'">
            <div class="banner-footer">
              <span>INFORMATION</span>
              <span>VIEW MORE →</span>
            </div>
          </a>
        </div>

      </div>

      <div class="dots">
        <span class="dot active"></span>
        <span class="dot"></span>
      </div>
    </section>

    <nav class="app-grid">
      <a class="app-item" href="main/index.html">
        <div class="icon-box"><img src="icon1.png" onerror="this.src='https://via.placeholder.com/100/333/fff?text=G'"></div>
        <span class="app-label">Gallery</span>
      </a>

      <a class="app-item" href="#">
        <div class="icon-box"><img src="icon2.png" onerror="this.src='https://via.placeholder.com/100/333/fff?text=W'"></div>
        <span class="app-label">Works</span>
      </a>

      <a class="app-item" href="#">
        <div class="icon-box"><img src="icon3.png" onerror="this.src='https://via.placeholder.com/100/333/fff?text=D'"></div>
        <span class="app-label">Doujin</span>
      </a>

      <a class="app-item" href="comike/goods/index.html">
        <div class="icon-box"><img src="icon4.png" onerror="this.src='https://via.placeholder.com/100/333/fff?text=Goods'"></div>
        <span class="app-label">Goods</span>
      </a>

      <a class="app-item" href="#">
        <div class="icon-box"><img src="icon5.png" onerror="this.src='https://via.placeholder.com/100/333/fff?text=Game'"></div>
        <span class="app-label">Game</span>
      </a>

      <a class="app-item" href="#">
        <div class="icon-box"><img src="icon6.png" onerror="this.src='https://via.placeholder.com/100/333/fff?text=About'"></div>
        <span class="app-label">About</span>
      </a>

      <a class="app-item" href="#">
        <div class="icon-box"><img src="icon7.png" onerror="this.src='https://via.placeholder.com/100/333/fff?text=X'"></div>
        <span class="app-label">Twitter / X</span>
      </a>

      <a class="app-item" href="#">
        <div class="icon-box"><img src="icon8.png" onerror="this.src='https://via.placeholder.com/100/333/fff?text=Mail'"></div>
        <span class="app-label">Contact</span>
      </a>
    </nav>

    <footer class="bottom-nav">
      <div class="nav-item">
        <div class="nav-icon">★</div>
        <div class="nav-text">FAVORITE</div>
      </div>

      <div class="nav-item center">
        <span class="badge">3</span>
        <div class="nav-icon">✉</div>
        <div class="nav-text">MESSAGE</div>
      </div>

      <div class="nav-item">
        <div class="nav-icon">≡</div>
        <div class="nav-text">MENU</div>
      </div>
    </footer>

  </div>

  <script>
    function updateTimeAndTheme() {
      const now = new Date();
      const h = now.getHours();
      const m = String(now.getMinutes()).padStart(2, '0');
      const days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];

      document.getElementById('clock').innerText = `${h}:${m}`;
      document.getElementById('date').innerText =
        `${now.getFullYear()}.${String(now.getMonth() + 1).padStart(2, '0')}.${String(now.getDate()).padStart(2, '0')} ${days[now.getDay()]}`;

      const section = document.getElementById('clock-section');
      section.classList.remove('morning', 'day', 'evening', 'night', 'midnight');

      if (h >= 5 && h < 10) section.classList.add('morning');
      else if (h >= 10 && h < 16) section.classList.add('day');
      else if (h >= 16 && h < 19) section.classList.add('evening');
      else if (h >= 19 && h < 24) section.classList.add('night');
      else section.classList.add('midnight');
    }

    setInterval(updateTimeAndTheme, 1000);
    updateTimeAndTheme();

    const weatherCanvas = document.getElementById('weather-canvas');
    const wCtx = weatherCanvas.getContext('2d');
    let weatherParticles = [];
    let weatherType = 'clear';

    function initWeather() {
      weatherCanvas.width = weatherCanvas.offsetWidth;
      weatherCanvas.height = weatherCanvas.offsetHeight;

      const rand = Math.random();
      if (rand < 0.3) weatherType = 'rain';
      else if (rand < 0.5) weatherType = 'snow';
      else weatherType = 'clear';

      weatherParticles = [];
      const count = weatherType === 'clear' ? 0 : 80;

      for (let i = 0; i < count; i++) {
        weatherParticles.push({
          x: Math.random() * weatherCanvas.width,
          y: Math.random() * weatherCanvas.height,
          l: Math.random() * 15 + 5,
          v: Math.random() * 5 + 2,
          s: Math.random() * 2 + 1
        });
      }
    }

    function drawWeather() {
      wCtx.clearRect(0, 0, weatherCanvas.width, weatherCanvas.height);

      if (weatherType !== 'clear') {
        weatherParticles.forEach(p => {
          if (weatherType === 'rain') {
            wCtx.strokeStyle = 'rgba(174, 194, 224, 0.4)';
            wCtx.beginPath();
            wCtx.moveTo(p.x, p.y);
            wCtx.lineTo(p.x + p.v / 2, p.y + p.l);
            wCtx.stroke();
            p.y += p.v * 2;
            p.x += p.v / 2;
          } else {
            wCtx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            wCtx.beginPath();
            wCtx.arc(p.x, p.y, p.s, 0, Math.PI * 2);
            wCtx.fill();
            p.y += p.v / 3;
            p.x += Math.sin(p.y / 20);
          }

          if (p.y > weatherCanvas.height) {
            p.y = -20;
            p.x = Math.random() * weatherCanvas.width;
          }
        });
      }

      requestAnimationFrame(drawWeather);
    }

    const slider = document.getElementById('slider');
    const dots = document.querySelectorAll('.dot');

    slider.addEventListener('scroll', () => {
      const index = Math.round(slider.scrollLeft / slider.offsetWidth);
      dots.forEach((dot, i) => dot.classList.toggle('active', i === index));
    });

    window.addEventListener('resize', initWeather);
    initWeather();
    drawWeather();
  </script>
</body>
</html>
